<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 238 50" width="238" height="50" role="img" aria-label="NEXInsurance logo">
  <title>NEXInsurance</title>

  <!-- Red rounded-square icon background -->
  <rect x="0" y="3" width="44" height="44" rx="10" ry="10" fill="#E40046"/>

  <!-- White stylised N — same paths as index.html, scaled from 26×26 to 44×44 -->
  <g transform="translate(0,3) scale(1.6923)">
    <path d="M5 21V5L13 17V5"  stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M13 21V9L21 21V5" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Wordmark: NEX (bold red) + Insurance (regular charcoal) -->
  <text x="54" y="35" font-family="Inter, Arial, Helvetica, sans-serif" font-size="24" letter-spacing="-0.5">
    <tspan font-weight="800" fill="#E40046">NEX</tspan><tspan font-weight="400" fill="#1D1D1B">Insurance</tspan>
  </text>
</svg>
